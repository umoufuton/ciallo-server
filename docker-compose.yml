services:
  postgres:
    image: postgres:16-alpine
    container_name: phoenix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - phoenix-net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phoenix-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_ENV: ${APP_ENV:-production}
      TZ: ${TZ:-Asia/Shanghai}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      API_BASE_URL: ${API_BASE_URL}
      CLIENT_APP_KEY: ${CLIENT_APP_KEY}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET}
      AUTH_TOKEN_TTL_SECONDS: ${AUTH_TOKEN_TTL_SECONDS:-604800}
      EXTERNAL_PLATFORM_PILOT_URL: ${EXTERNAL_PLATFORM_PILOT_URL}
      EXTERNAL_PLATFORM_USERINFO_URL: ${EXTERNAL_PLATFORM_USERINFO_URL}
      EXTERNAL_PLATFORM_VERIFY_URL: ${EXTERNAL_PLATFORM_VERIFY_URL}
      EXTERNAL_PLATFORM_API_KEY: ${EXTERNAL_PLATFORM_API_KEY}
      PILOT_OAUTH_CLIENT_ID: ${PILOT_OAUTH_CLIENT_ID}
      PILOT_OAUTH_REDIRECT_URI: ${PILOT_OAUTH_REDIRECT_URI}
      PILOT_OAUTH_SCOPE: ${PILOT_OAUTH_SCOPE}
      PILOT_OAUTH_AUTHORIZE_URL: ${PILOT_OAUTH_AUTHORIZE_URL}
      PILOT_OAUTH_TOKEN_URL: ${PILOT_OAUTH_TOKEN_URL}
      OPS_OAUTH_TOKEN_URL: ${OPS_OAUTH_TOKEN_URL}
      OPS_CLIENT_ID: ${OPS_CLIENT_ID}
      OPS_CLIENT_SECRET: ${OPS_CLIENT_SECRET}
      OPS_SCOPE: ${OPS_SCOPE}
      OPS_API_BASE_URL: ${OPS_API_BASE_URL}
      OPS_PILOT_BY_USERNAME_PATH: ${OPS_PILOT_BY_USERNAME_PATH}
    volumes:
      - ./data:/data
    expose:
      - "3000"
    networks:
      - phoenix-net

  nginx:
    image: nginx:1.27-alpine
    container_name: phoenix-nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    networks:
      - phoenix-net

volumes:
  postgres_data:

networks:
  phoenix-net:
    driver: bridge
